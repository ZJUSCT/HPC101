[project]
site_name = "HPC101"
site_url = "https://hpc101.zjusct.io/"
repo_url = "https://github.com/ZJUSCT/HPC101"
repo_name = "ZJUSCT/HPC101"
edit_uri = "blob/main/docs/"
site_description = "浙江大学计算机学院暑期课程 HPC101 实验网站"
site_author = "ZJUSCT"
copyright = "ZJUSCT"

nav = [
    { "课程信息" = [
        "index.md",
    ] },
    { "课程实验" = [
        { "Lab 0: Linux 快速入门" = "lab/Lab0-LinuxCrashCourse/index.md" },
        { "Lab 1: 简单集群搭建" = "lab/Lab1-MiniCluster/index.md" },
    ] },
    { "课程幻灯片" = "slides/index.md" },
]

extra_css = [
    "stylesheets/fonts.css",
    "stylesheets/counter.css",
    "stylesheets/theme.css",
    "stylesheets/neoteroi-v1.1.2.css",
]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://cdn.jsdelivr.net/npm/polyfill/index.min.js",
    "https://cdn.jsdelivr.net/npm/mathjax/es5/tex-mml-chtml.js",
    "https://cdn.jsdelivr.net/npm/tablesort/dist/tablesort.min.js",
    "javascripts/tablesort.js",
    "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js",
]

# --------------------------------------------------------------------------
# Theme
# --------------------------------------------------------------------------
[project.theme]
custom_dir = "overrides"
logo = "assets/zjusct.svg"
favicon = "assets/zjusct-hpc101.svg"
features = [
    "content.action.edit",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "navigation.expand",
    "navigation.footer",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.share",
    "search.suggest",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "pink"
toggle.icon = "lucide/sun-moon"
toggle.name = "切换至浅色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "pink"
toggle.icon = "lucide/sun"
toggle.name = "切换至深色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "pink"
toggle.icon = "lucide/moon"
toggle.name = "根据系统模式切换主题"

# --------------------------------------------------------------------------
# Markdown extensions
# --------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
slugify = { object = "pymdownx.slugs.slugify", kwds = { case = "lower" } }

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions."neoteroi.timeline"]
[project.markdown_extensions."neoteroi.projects"]
[project.markdown_extensions."neoteroi.cards"]

[project.markdown_extensions."extensions.git_info"]
repository = "ZJUSCT/HPC101"
branch = "main"

# --------------------------------------------------------------------------
# Plugins
# --------------------------------------------------------------------------
[project.plugins.glightbox]
[project.plugins.tags]
